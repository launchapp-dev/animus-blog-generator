# ── Shared base ──────────────────────────────────────────────────────────
# Globals, MCP servers, subjects, all agents, and the SHARED content-pipeline
# phases. Per-workflow phases + workflow defs + schedules live in workflow-*.yaml.
# All .animus/workflows/*.yaml compile together (animus workflow config compile).
default_workflow_ref: standard-workflow
tools_allowlist:
- git
- gh
- bash
- WebSearch
- WebFetch
mcp_servers:
  animus:
    command: animus
    args:
    - mcp
    - serve
  exa:
    command: npx
    args:
    - -y
    - exa-mcp-server
    env:
      EXA_API_KEY: ${EXA_API_KEY:-UNSET}
  tavily:
    command: npx
    args:
    - -y
    - tavily-mcp
    env:
      TAVILY_API_KEY: ${TAVILY_API_KEY:-UNSET}
  brave:
    command: npx
    args:
    - -y
    - '@anthropic/brave-search-mcp'
    env:
      BRAVE_API_KEY: ${BRAVE_API_KEY:-UNSET}
  firecrawl:
    command: npx
    args:
    - -y
    - firecrawl-mcp-server
    env:
      FIRECRAWL_API_KEY: ${FIRECRAWL_API_KEY:-UNSET}
  google-maps:
    command: npx
    args:
    - -y
    - google-maps-mcp-server
    env:
      GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY:-UNSET}
  search-console:
    command: npx
    args:
    - -y
    - search-console-mcp
    env:
      GSC_CLIENT_EMAIL: ${GSC_CLIENT_EMAIL:-UNSET}
      GSC_PRIVATE_KEY: ${GSC_PRIVATE_KEY:-UNSET}
  replicate:
    command: npx
    args:
    - -y
    - replicate-mcp
    env:
      REPLICATE_API_TOKEN: ${REPLICATE_API_TOKEN:-UNSET}
  perplexity:
    command: npx
    args:
    - -y
    - '@perplexity/modelcontextprotocol'
    env:
      PERPLEXITY_API_KEY: ${PERPLEXITY_API_KEY:-UNSET}
  transcript-source:
    # SINGLE active transcript provider (Krisp OR Granola — never both). Wire
    # your provider's MCP command/args/env here; TRANSCRIPT_PROVIDER must match
    # what you wire. Until then this stub exits immediately, so transcript-fetch
    # fails fast (not silently) and the discovery schedule stays disabled.
    command: "true"
    args: []
    env: {}
  content-library:
    # BRING YOUR OWN (macOS): an org "knowledge brain" MCP server that gives
    # agents deep drafting context — prior research, established facts, brand
    # positions, and angles already used — so they produce unique, high-quality
    # content. Replace command/args/env with your own content MCP. Until then
    # this is a no-op stub; agents fall back to content/manifest.json + research.
    command: "true"
    args: []
    env: {}
subjects:
  - id: linear-discovery
    backend: linear
    config:
      # Real values go in .env (sourced into the daemon's shell). Uses the
      # repo's :-UNSET convention so config compiles before secrets exist; the
      # linear backend stays non-functional until LINEAR_API_TOKEN is set.
      team_id: ${LINEAR_TEAM_ID:-UNSET}
      project_id: ${LINEAR_DISCOVERY_PROJECT_ID:-UNSET}
agents:
  content-strategist:
    model: claude-sonnet-4-6
    tool: claude
    mcp_servers:
    - animus
    - exa
    - tavily
    - brave
    - firecrawl
    - search-console
    - content-library
    system_prompt: |
      SKILLS: Read and follow .animus/skills/content-strategy.md
      CONTEXT: Read business-context.yaml for all client details — business info,
      target audience, competitors, content pillars, and differentiators.

      CONTENT BRAIN: Consult content-library for prior coverage, established
      facts, and angles already used when selecting topics or building briefs;
      ground choices in it. If unavailable or empty, use content/manifest.json
      and external research — do not block.

      Only in the news-scan / discovery phases: create tasks via
      animus_task_create and enqueue via animus_queue_enqueue for genuinely
      time-sensitive topics. When converting an existing ticket to a brief, do
      NOT create new subjects.
  content-researcher:
    model: claude-sonnet-4-6
    tool: claude
    mcp_servers:
    - firecrawl
    - exa
    - tavily
    - brave
    - google-maps
    - content-library
    system_prompt: |
      CONTEXT: Read business-context.yaml — niche, audience, market area,
      competitors. Ground every search in that context.

      You gather source material for the content-writer; you do not write prose.

      CONTENT BRAIN: Query content-library (the org knowledge brain) for prior
      research, established facts, and brand positions; treat it as a primary
      source alongside external search. If it is unavailable or returns nothing,
      continue with external sources only — do not block.

      SOURCING RULES:
      - Prefer primary, recent, authoritative sources (industry/market reports,
        government or census data, named studies). Capture the exact source URL
        and publication date for each.
      - Every statistic must carry an attributable source — no orphan numbers.
      - Include local/market context when the niche is geo-relevant.
      - Flag claims you could not verify instead of passing them through.
  content-writer:
    model: claude-opus-4-6
    tool: claude
    mcp_servers:
    - content-library
    system_prompt: |
      SKILLS: Read and follow .animus/skills/content-production.md,
      .animus/skills/ai-seo.md, .animus/skills/content-humanizer.md
      CONTEXT: Read business-context.yaml for client details and voice guidelines.

      CONTENT BRAIN: Before drafting, query content-library for related prior
      work, established facts, brand positions, and angles already used; ground
      the post in that context and avoid repeating prior angles. If
      content-library is unavailable or returns nothing, proceed using
      content/manifest.json and the research package — do not block.

      Write in the voice defined in business-context.yaml. Use the perspective,
      tone, and style specified there. Reference specific locations and details
      relevant to the business's market area.

      CONTENT RULES: Get to the point in 3-4 sentences. All claims need citations.
      Target readability: US grade 8-10 (Flesch Reading Ease ~60-70).
      Structure for scannability — headers, bullets, tables.
      Include Q&A sections for LLM extractability. Use specific numbers with sources.
      Include "As of [date]..." for recency signals.

      SEO: Target keyword in title, first paragraph, one H2, meta description.
      Keyword density 0.5-1.5%. Internal links to 2-3 related blog posts —
      source candidates from content-library MCP and content/manifest.json;
      use real slugs of published posts, do not invent them.
      First paragraph answers the core query directly (featured snippet).

      Output contract reminder: slug is required and must be emitted verbatim —
      downstream register-post and linear-finalize depend on it.

      Output: markdown with frontmatter (title, slug, meta_description, date,
      author, keywords, schema_type, content_pillar, target_keyword, word_count,
      featuredImage, excerpt, seoTitle, seoDescription).
  seo-optimizer:
    model: claude-sonnet-4-6
    tool: claude
    mcp_servers:
    - search-console
    - firecrawl
    - content-library
    system_prompt: |
      SKILLS: Read and follow .animus/skills/seo-audit.md,
      .animus/skills/schema-markup.md, .animus/skills/ai-seo.md

      SEO AUDIT CHECKLIST:
      - Target keyword in title, first paragraph, at least one H2, meta description
      - Keyword density 0.5-1.5%
      - Meta description under 155 characters with CTA
      - Title under 60 characters
      - Internal links to 2-3 related blog posts (not service pages).
        Verify each slug via content-library MCP or content/manifest.json;
        drop and replace any broken slug.
      - No AI cliche words
      - Readability grade 8-10

      SCHEMA MARKUP: This is a markdown/frontmatter pipeline. Update supported
      frontmatter/schema fields when available. Do not inject raw <script> tags
      into the article body unless the site's renderer explicitly expects them.
      If raw JSON-LD is needed but unsupported by the markdown format, emit a
      schema_recommendation instead.

      AI CITABILITY: Content structured as extractable chunks — definitions,
      numbered steps, comparison tables, FAQs, attributed statistics.
      Named entities (people, places, organizations) not generics.
  asset-generator:
    model: claude-sonnet-4-6
    tool: claude
    mcp_servers:
    - replicate
    system_prompt: |
      SKILLS: Read and follow .animus/skills/social-content.md
      CONTEXT: Read business-context.yaml for brand voice, social guidelines,
      and visual aesthetic.

      You produce two asset types depending on the phase: a featured IMAGE, or
      SOCIAL excerpts.

      IMAGE RULES (asset-generation, image-regen):
      - Style: professional photography relevant to the business niche, natural
        lighting. No text overlays, watermarks, or AI artifacts. 16:9.
      - Model: google/nano-banana-pro. Save to assets/<slug>.webp only after
        validating the actual file is WebP with nonzero dimensions and a 16:9-ish
        aspect ratio.

      SOCIAL CONTENT RULES (social-excerpts):
      - Instagram: short, emoji-friendly, 5-10 hashtags, hook-first
      - Facebook: conversational, end with a question to drive comments
      - LinkedIn: professional, data-forward, insight-led
      - Adapt per platform — never copy-paste across channels
  performance-analyst:
    model: claude-sonnet-4-6
    tool: claude
    mcp_servers:
    - animus
    - search-console
    - exa
    - perplexity
    system_prompt: |
      SKILLS: Read and follow .animus/skills/ai-seo.md
      CONTEXT: Read business-context.yaml for business details and content pillars.
  content-refresher:
    model: claude-opus-4-6
    tool: claude
    mcp_servers:
    - firecrawl
    - content-library
    system_prompt: |
      SKILLS: Read and follow .animus/skills/content-production.md,
      .animus/skills/ai-seo.md, .animus/skills/content-humanizer.md
      CONTEXT: Read business-context.yaml for client details and voice guidelines.

      CONTENT BRAIN: Pull the post's original context and prior angles from
      content-library before refreshing, to preserve the unique angle. If
      unavailable or empty, rely on the existing post + Firecrawl — do not block.

      Voice and content rules are defined in the skills above; apply them
      identically to the content-writer.
      Focus on updating statistics, prices, rates, and time-sensitive claims.
      Maintain the original unique angle while incorporating competitor improvements.
      Structure for AI citability — extractable chunks, attributed statistics, Q&A.
      No AI cliche words. Vary sentence length. Include opinions.
  transcript-collector:
    model: claude-haiku-4-5
    tool: claude
    mcp_servers:
    - transcript-source
    system_prompt: |
      You are a data-ingest agent. List new transcripts from the configured
      transcript provider (the transcript-source MCP) since a cursor and stage
      them to disk. You do NOT advance the cursor — the next phase does, only
      after successful processing.
  idea-strategist:
    model: claude-sonnet-4-6
    tool: claude
    mcp_servers:
    - animus
    - content-library
    - search-console
    - exa
    - tavily
    - brave
    - firecrawl
    system_prompt: |
      SKILLS: Read and follow .animus/skills/content-strategy.md AND the
      animus-subject-operations skill (auto-loaded) for correct subject
      API usage.

      CONTEXT: Read business-context.yaml at every run — niche, pillars,
      audience, voice, competitors, differentiators. Refuse if missing
      (skip reason "missing_business_context").

      CONTENT BRAIN: Use content-library not just for dedup but to retrieve
      related context that sharpens and differentiates each angle. If it is
      unavailable or returns nothing, fall back to content/manifest.json — do
      not block.

      Propose blog ideas grounded in transcripts and external SEO viability.
      Hard rule: LINEAR_DISCOVERY_PROJECT_ID must be set (skip reason
      "missing_project_id" otherwise).

      Cursor discipline: advance .animus/state/discovery-cursor.json ONLY after
      a transcript is fully processed (every surviving angle has either
      become a subject or been confirmed-duplicate). Fail mid-transcript
      leaves cursor at the previous transcript.
  approval-watcher:
    model: claude-haiku-4-5
    tool: claude
    mcp_servers:
    - animus
    system_prompt: |
      SKILLS: animus-subject-operations + animus-queue-management +
      animus-task-management.

      Polling agent. Detects Linear-backed subjects whose Animus status
      became in-progress (the approval signal) and dispatches blog-from-ticket
      runs for them.

      Filter rules (use exact lowercase values):
        - Include: status == in-progress
        - Exclude: status in {cancelled, done, blocked, ready}

      Scope every query to LINEAR_DISCOVERY_PROJECT_ID.
  linear-coordinator:
    model: claude-haiku-4-5
    tool: claude
    mcp_servers:
    - animus
    system_prompt: |
      SKILLS: animus-subject-operations (auto-loaded) for correct subject
      API usage.

      Manages Linear ticket comments (and optionally status) for
      blog-from-ticket runs. Two modes:
      - "acknowledge": re-check status; if still in-progress, post a start
        comment; if not in-progress, abort cleanly.
      - "finalize": post a rich completion comment; optionally transition
        to done if LINEAR_FINALIZE_TRANSITION=done.

      Linear is the single source of truth for lifecycle — only finalize
      writes status back; never infer state from local wrappers.
  register-post-runner:
    model: claude-haiku-4-5
    tool: claude
    mcp_servers: []
    system_prompt: |
      You are a one-shot script runner. Read slug from the prior phase output
      (seo-review's output_contract emits it). Read linear_subject_id and
      source_transcript_id from the run input / topic_brief phase if
      available. Run scripts/register-post.sh with those as env vars and
      capture the last stdout line as commit_message.
phases:
  research-collection:
    mode: agent
    agent: content-researcher
    directive: |
      Using the topic brief from the prior phase, gather all source
      material. Scrape publicly available data sources via Firecrawl:
      industry reports, market summaries, government records, census data.
      Get location info from Google Maps if relevant. Search via Exa,
      Tavily, and Brave for additional data points, competitor coverage,
      and real questions.

      Output a structured research package with primary data, source
      URLs, key quotes, data tables, and local context. Always cite
      the source for any statistic.
    output_contract:
      kind: phase_result
      required_fields:
      - research_package
      fields:
        research_package:
          type: object
          description: All source material needed for the content writer
        source_count:
          type: integer
          description: Number of sources consulted
  content-writing:
    mode: agent
    agent: content-writer
    directive: |
      Write the full blog post as a markdown file using the topic brief
      and research package from prior phases. Follow the voice rules and
      SEO rules in your system prompt exactly.

      The post is a .md file with YAML frontmatter including:
      title, slug, meta_description, date, author, keywords, schema_type,
      content_pillar, target_keyword, word_count, featuredImage (leave empty),
      excerpt, seoTitle, seoDescription.

      Save the file to content/<slug>.md in this repo. Do NOT commit yet —
      the next phase handles that.
    capabilities:
      mutates_state: true
    output_contract:
      kind: phase_result
      required_fields:
      - slug
      fields:
        slug:
          type: string
          description: The post slug (filename without .md)
        word_count:
          type: integer
          description: Final word count of the post body
        target_keyword:
          type: string
          description: The primary SEO target keyword
  commit-draft:
    mode: command
    directive: Commit the blog post draft (exit 1 OK if already committed)
    command:
      program: bash
      args:
      - -c
      - git add content/ assets/ && git diff --cached --quiet && echo 'nothing to commit' || git commit -m 'Add blog post draft'
      cwd_mode: task_root
      timeout_secs: 30
  seo-review:
    mode: agent
    agent: seo-optimizer
    directive: |
      Audit and fix the blog post in content/<slug>.md. Fix ALL issues
      yourself — do not send back for rework.

      Work efficiently:
      - Estimate character counts, do not count one by one
      - Make all edits in a single pass, then commit
      - If keyword density is low, add 3-5 natural mentions and move on

      Checklist:
      - Target keyword in title, first paragraph, at least one H2, meta description
      - Keyword density 0.5-1.5%
      - Internal links to 2-3 related blog posts (not service pages)
      - Meta description under 155 characters with CTA
      - Title under 60 characters
      - No AI cliche words
      - Readability: grade 8-10
      - Schema: update supported frontmatter/schema fields only. If JSON-LD is
        needed but unsupported by the markdown format, emit schema_recommendation
        instead of inserting script tags into the article body.

      Edit the file directly, then commit with message describing fixes.

      Read the slug from content-writing's output and emit it verbatim in your
      phase result (it is a required output field). Downstream register-post and
      linear-finalize depend on receiving the slug.
    capabilities:
      mutates_state: true
    output_contract:
      kind: implementation_result
      required_fields:
      - commit_message
      - slug
      fields:
        commit_message:
          type: string
        slug:
          type: string
          description: Post slug threaded from content-writing (register-post needs it)
        seo_score:
          type: integer
          description: SEO quality score 0-100 after fixes
        fixes_applied:
          type: array
          description: List of fixes applied
          items:
            type: string
        schema_recommendation:
          type: string
          description: Schema guidance when JSON-LD cannot be represented safely in markdown
  asset-generation:
    mode: agent
    agent: asset-generator
    directive: |
      Generate a featured image for the blog post using the Replicate API.
      Use model: google/nano-banana-pro

      1. Read content/<slug>.md to understand the topic
      2. Read business-context.yaml for the business niche and aesthetic
      3. Craft a detailed image prompt for the topic (follow the IMAGE RULES
         in your system prompt).
      4. Call create_models_predictions with model_owner="google",
         model_name="nano-banana-pro", input={ prompt: "...", aspect_ratio: "16:9" }
      5. Poll get_predictions until status is "succeeded"
      6. Download the output image to a temporary path. Detect the actual image
         format, convert to WebP if needed, verify MIME type is image/webp,
         verify nonzero dimensions and approximately 16:9 aspect ratio, then
         save to assets/<slug>.webp.
      7. Update the post frontmatter featuredImage field only after validation
         passes.
      8. Commit with message
    capabilities:
      mutates_state: true
    output_contract:
      kind: implementation_result
      required_fields:
      - commit_message
  social-excerpts:
    mode: agent
    agent: asset-generator
    directive: |
      Generate social media excerpts for the blog post. Read the post
      from content/<slug>.md and create platform-specific content:

      Save to content/<slug>.social.md with sections for Instagram,
      Facebook, and LinkedIn. Follow the social content rules in your
      system prompt. Commit with message.
    capabilities:
      mutates_state: true
    output_contract:
      kind: implementation_result
      required_fields:
      - commit_message
  push-branch:
    mode: command
    directive: Push the branch to origin
    command:
      program: git
      args:
      - push
      - -u
      - origin
      - HEAD
      cwd_mode: task_root
      timeout_secs: 60
  register-post:
    mode: agent
    agent: register-post-runner
    directive: |
      Read inputs:
        - slug: from seo-review's phase result (required)
        - linear_subject_id: from the run input (empty for cron blog-production)
        - source_transcript_id: from ticket-to-brief's topic_brief (empty otherwise)

      Run via Bash:
        env LINEAR_SUBJECT_ID="<linear_subject_id or empty>" \
            SOURCE_TRANSCRIPT_ID="<source_transcript_id or empty>" \
            bash scripts/register-post.sh "<slug>"

      Parse the last non-empty stdout line as commit_message.

      Output: slug (pass-through), linear_subject_id (pass-through), commit_message.
    capabilities:
      mutates_state: true
    output_contract:
      kind: implementation_result
      required_fields:
      - commit_message
      - slug
      fields:
        commit_message:
          type: string
        slug:
          type: string
        linear_subject_id:
          type: string
