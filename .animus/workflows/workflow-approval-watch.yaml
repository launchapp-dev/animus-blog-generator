# approval-watch — poll Linear for in-progress (approved) issues, dispatch blog-from-ticket.
# The gate is a DETERMINISTIC command phase (scripts/approval-watch.sh), not an
# agent — idempotency must be exact. See
# docs/superpowers/plans/2026-06-23-deterministic-approval-watcher.md.
# The `approval-watcher` AGENT definition is retained in custom.yaml for one
# release as scaffolding (now unused); remove it once this script is proven live.
phases:
  approval-watcher:
    mode: command
    # REQUIRED: .animus/state/ is gitignored, so it is NOT present in a worktree.
    # Running in the project root is what makes approval-seen.json persist across
    # runs — without it the dedup state is discarded every poll and every
    # approval re-dispatches.
    worktree: skip
    directive: Poll Linear approvals deterministically and enqueue approved blog tickets (scripts/approval-watch.sh)
    command:
      program: bash
      args:
      - scripts/approval-watch.sh
      cwd_mode: task_root
      timeout_secs: 120
workflows:
- id: approval-watch
  name: Linear Approval Watcher
  description: Poll Linear-backed subjects for in-progress status and dispatch blog-from-ticket
  phases:
  - approval-watcher
schedules:
- id: approval-watch
  cron: "*/15 * * * *"
  workflow_ref: approval-watch
  # Disabled until Linear secrets are configured AND the live smoke test in the
  # plan passes (comment-posting, project_id presence, --task-id blogtask, list
  # limit). Flip to true only then.
  enabled: false
