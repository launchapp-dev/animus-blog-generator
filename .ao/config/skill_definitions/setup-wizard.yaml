skills:
  setup-wizard:
    capabilities:
      is_research: true
      mutates_state: true
    category: setup
    description: Interactive setup wizard that generates business-context.yaml for the blog pipeline.
    name: setup-wizard
    prompt:
      directives:
      - Walk user through business context questionnaire one question at a time
      - Gather business info, audience, competitors, voice, content pillars, and preferences
      - Generate business-context.yaml with all pipeline configuration
      - Use sensible defaults and multiple-choice questions when possible
      - Suggest content pillars based on the business niche if user has none
    tags:
    - setup
    - onboarding
    - configuration
    version: 1.0.0
