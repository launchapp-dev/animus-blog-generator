skills:
  ai-seo:
    category: review
    description: "Generative engine optimization \u2014 get cited by AI systems, not\
      \ just ranked in search."
    name: ai-seo
    prompt:
      directives:
      - Ranked = user sees your link. Cited = AI decides your content answers the
        question.
      - "Structure content as extractable chunks \u2014 definitions, numbered steps,\
        \ comparison tables, FAQs"
      - Include attributed statistics with specific numbers and sources
      - "Use named entities \u2014 specific people, places, organizations, not generics"
      - Add expert quotes and first-person authority signals
      - Include Q&A sections that LLMs can extract directly
      - "State facts with specificity \u2014 \"$485,000 median\" not \"prices are\
        \ moderate\""
      - "Updated dates in content body \u2014 \"As of March 2026...\" for recency\
        \ signals"
      - Ensure schema markup (Article, FAQ, LocalBusiness) is present and correct
      - Verify AI bot access is not blocked in robots.txt
    tags:
    - seo
    - ai
    - llm
    - citations
    - geo
    version: 1.0.0
