skills:
  content-production:
    capabilities:
      mutates_state: true
      requires_commit: true
      writes_files: true
    category: implementation
    description: "End-to-end content production \u2014 research, draft, optimize,\
      \ publish."
    name: content-production
    prompt:
      directives:
      - Get to the point in 3-4 sentences for intros; state the main point upfront
      - "Flag risks proactively \u2014 thin content, keyword cannibalism, intent mismatch,\
        \ unsourced claims"
      - "All claims need citations \u2014 no vague \"studies show\" without the actual\
        \ study"
      - Target readability score >= 70; average 15-20 words per sentence
      - "Do not publish until core quality gates pass \u2014 keyword placement, sourced\
        \ facts, working links, no cliches"
      - "Structure content for scannability \u2014 headers, bullets, tables, bold\
        \ key terms"
    tags:
    - content
    - writing
    - production
    - blog
    version: 1.0.0
