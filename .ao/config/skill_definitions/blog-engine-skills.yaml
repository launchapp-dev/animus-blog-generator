skills:
  content-strategy:
    name: content-strategy
    version: "1.0.0"
    description: Content strategy for topic discovery, pillar planning, and gap analysis.
    category: research

    prompt:
      directives:
        - Before planning content, gather business context, audience, and competitive landscape
        - Deliver 3-5 content pillars with rationale and subtopic clusters
        - Prioritize topics by type (searchable/shareable), keyword opportunity, and buyer stage
        - Flag missing content plans, low traffic despite content, and content lacking keyword targets
        - Surface competitor gap analysis and quick wins
        - Use confidence tagging for recommendations

    capabilities:
      mutates_state: true
      is_research: true

    tags: ["content", "strategy", "seo", "planning"]

  content-production:
    name: content-production
    version: "1.0.0"
    description: End-to-end content production — research, draft, optimize, publish.
    category: implementation

    prompt:
      directives:
        - Get to the point in 3-4 sentences for intros; state the main point upfront
        - Flag risks proactively — thin content, keyword cannibalism, intent mismatch, unsourced claims
        - All claims need citations — no vague "studies show" without the actual study
        - Target readability score >= 70; average 15-20 words per sentence
        - Do not publish until core quality gates pass — keyword placement, sourced facts, working links, no cliches
        - Structure content for scannability — headers, bullets, tables, bold key terms

    capabilities:
      writes_files: true
      mutates_state: true
      requires_commit: true

    tags: ["content", "writing", "production", "blog"]

  ai-seo:
    name: ai-seo
    version: "1.0.0"
    description: Generative engine optimization — get cited by AI systems, not just ranked in search.
    category: review

    prompt:
      directives:
        - "Ranked = user sees your link. Cited = AI decides your content answers the question."
        - Structure content as extractable chunks — definitions, numbered steps, comparison tables, FAQs
        - Include attributed statistics with specific numbers and sources
        - Use named entities — specific people, places, organizations, not generics
        - Add expert quotes and first-person authority signals
        - Include Q&A sections that LLMs can extract directly
        - State facts with specificity — "$485,000 median" not "prices are moderate"
        - Updated dates in content body — "As of March 2026..." for recency signals
        - Ensure schema markup (Article, FAQ, LocalBusiness) is present and correct
        - Verify AI bot access is not blocked in robots.txt

    tags: ["seo", "ai", "llm", "citations", "geo"]

  seo-audit:
    name: seo-audit
    version: "1.0.0"
    description: On-page SEO audit — keyword placement, density, meta tags, internal linking.
    category: review

    prompt:
      directives:
        - Target keyword must appear in title, first paragraph, at least one H2, and meta description
        - Keyword density 0.5-1.5% — not stuffed, not absent
        - Meta description under 155 characters with a call to action
        - Title under 60 characters
        - Internal links to 2-3 related blog posts (not service pages)
        - External links to 1-2 authoritative sources
        - Image alt text includes keyword variations
        - No AI cliche words — delve, landscape, navigate, leverage, ever-evolving, tapestry
        - Readability grade 8-10 Flesch-Kincaid
        - Check for duplicate content against existing posts on the same site

    capabilities:
      is_review: true
      writes_files: true

    tags: ["seo", "audit", "review", "optimization"]

  schema-markup:
    name: schema-markup
    version: "1.0.0"
    description: JSON-LD schema markup implementation for rich results and AI visibility.
    category: review

    prompt:
      directives:
        - Use JSON-LD only — not Microdata or RDFa
        - Article schema for blog posts with author, datePublished, dateModified, headline
        - LocalBusiness schema tying content to the business entity
        - FAQ schema for any Q&A sections (earns featured snippets and LLM citations)
        - BreadcrumbList schema for navigation signals
        - Never add schema for content not actually on the page
        - Required fields must be present — missing them blocks rich results
        - Match schema content to visible page content exactly

    capabilities:
      is_review: true

    tags: ["seo", "schema", "structured-data", "json-ld"]

  social-content:
    name: social-content
    version: "1.0.0"
    description: Platform-specific social media content from blog posts.
    category: implementation

    prompt:
      directives:
        - Instagram — short, visual-first, emoji-friendly, 5-10 relevant hashtags
        - Facebook — conversational, end with a question to drive comments
        - LinkedIn — professional, data-forward, insight-led
        - Hooks first — use curiosity, story, value, or contrarian angles
        - Adapt content per platform — never copy-paste the same text across all channels
        - Keep sales content under 20% of total posts
        - Include repurposing strategy — one blog post becomes multiple platform-specific posts

    capabilities:
      writes_files: true

    tags: ["social", "content", "instagram", "facebook", "linkedin"]

  content-humanizer:
    name: content-humanizer
    version: "1.0.0"
    description: Make AI-generated content read like a human expert wrote it.
    category: review

    prompt:
      directives:
        - Vary sentence length dramatically — short punchy sentences mixed with longer nuanced ones
        - Include colloquialisms and regional language appropriate to the market
        - Reference personal experiences and opinions — "I think...", "In my experience..."
        - Add parenthetical asides and conversational tangents
        - No AI cliche words — delve, landscape, navigate, leverage, ever-evolving, tapestry, realm, foster, moreover, furthermore, utilize
        - Avoid uniform paragraph length — mix short 1-2 sentence paragraphs with longer ones
        - Include specific anecdotes that only someone with real experience would know
        - Opinions are required — take a position, don't hedge everything

    capabilities:
      is_review: true

    tags: ["content", "humanize", "voice", "anti-ai-detection"]
