skills:
  seo-audit:
    capabilities:
      is_review: true
      writes_files: true
    category: review
    description: "On-page SEO audit \u2014 keyword placement, density, meta tags,\
      \ internal linking."
    name: seo-audit
    prompt:
      directives:
      - Target keyword must appear in title, first paragraph, at least one H2, and
        meta description
      - "Keyword density 0.5-1.5% \u2014 not stuffed, not absent"
      - Meta description under 155 characters with a call to action
      - Title under 60 characters
      - Internal links to 2-3 related blog posts (not service pages)
      - External links to 1-2 authoritative sources
      - Image alt text includes keyword variations
      - "No AI cliche words \u2014 delve, landscape, navigate, leverage, ever-evolving,\
        \ tapestry"
      - Readability grade 8-10 Flesch-Kincaid
      - Check for duplicate content against existing posts on the same site
    tags:
    - seo
    - audit
    - review
    - optimization
    version: 1.0.0
